name: 🚀 CI/CD Pipeline # 워크플로우 이름

# 워크플로우 실행 시점 정의
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # 1. CI 가동: 타입 체크, 린트(코드 스타일), 빌드 테스트
  ci:
    name: 🧪 CI (Type Check · Lint · Build)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout # 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js # Node.js 환경 구축
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm # npm 의존성 캐시 활용 (속도 향상)

      - name: 📦 Install dependencies # 패키지 설치
        run: npm ci

      - name: 🔎 Type check # TypeScript 타입 검사
        run: npx tsc --noEmit

      - name: 🧹 Lint # 코드 스타일 검사
        run: npm run lint

      - name: 🛠️ Build # 프로덕션 빌드 테스트
        run: npm run build
        env:
          # 빌드 시점에 필요한 환경변수들을 GitHub Secrets에서 가져와 설정
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          # 새로 추가된 환경변수들도 필요한 경우 아래에 추가
          NEXT_PUBLIC_GOOGLE_IOS_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_IOS_CLIENT_ID }}
          NEXT_PUBLIC_GOOGLE_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_API_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}

  # 2. Deploy 가동: 빌드 성공 후 Vercel로 배포 (main 브랜치 push 전용)
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: ci # CI 작업이 성공해야만 실행
    # main 브랜치에 직접 푸시되었을 때만 실행되도록 설정
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Deploy # Vercel이 자체 빌드 및 프로덕션 배포
        uses: amondnet/vercel-action@v25.2.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          github-comment: false
